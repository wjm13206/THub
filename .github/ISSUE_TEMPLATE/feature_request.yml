name: 功能建议
description: 为 THub 提出新功能或改进建议
title: "[建议] "
labels: ["enhancement"]
assignees: []
body:
  - type: textarea
    id: problem
    attributes:
      label: 你的建议是否与某个问题相关？请描述。
      description: 清晰简洁地描述是什么问题。
      placeholder: 当 [...] 时，我总是感到困扰。
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: 描述你想要的解决方案
      description: 清晰简洁地描述你希望发生的事情。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 描述你考虑过的替代方案
      description: 清晰简洁地描述你考虑过的任何替代解决方案或功能。
    validations:
      required: false
  - type: textarea
    id: usage
    attributes:
      label: 使用场景
      description: 描述该功能在什么场景下会用到，以及它如何帮助你。
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 附加上下文
      description: 在此添加关于功能建议的任何其他上下文或截图。
    validations:
      required: false
